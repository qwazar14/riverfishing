# Sets default memory used for gradle commands. Can be overridden by user or command line properties.
# This is required to provide enough memory for the Minecraft decompilation process.
org.gradle.jvmargs=-Xmx3G
org.gradle.daemon=false

# --- Toolchain ---
# This machine has no system-wide JDK, but PrismLauncher bundles a full JDK 17.
# Point Gradle's toolchain resolver at it and disable network auto-provisioning.
org.gradle.java.installations.paths=C:/Users/Qwazar/AppData/Roaming/PrismLauncher/java/java-runtime-gamma
org.gradle.java.installations.auto-download=false


## Environment Properties

# The Minecraft version must agree with the Forge version to get a valid artifact
minecraft_version=1.20.1
# The Minecraft version range can use any release version of Minecraft as bounds.
minecraft_version_range=[1.20.1,1.21)
# The Forge version must agree with the Minecraft version to get a valid artifact
forge_version=47.3.0
# The Forge version range can use any version of Forge as bounds or match the loader version range
forge_version_range=[47,)
# The loader version range can only use the major version of Forge/FML as bounds
loader_version_range=[47,)
# The mapping channel to use for mappings.
mapping_channel=official
# The mapping version to query from the mapping channel.
mapping_version=1.20.1
# JEI (Just Enough Items) — compile-time API for the fishing recipe category. Matches the pack's JEI.
jei_version=15.20.0.132


## Mod Properties

# The unique mod identifier for the mod. Must be lowercase. Must match the @Mod constant.
mod_id=riverfishing
# The human-readable display name for the mod.
mod_name=River Fishing
# The license of the mod.
mod_license=MIT
# The mod version. See https://semver.org/
mod_version=0.1.0
# The group ID for the mod. Should match the base package used for the mod sources.
mod_group_id=com.riverfishing
# The authors of the mod.
mod_authors=Qwazar
# The description of the mod.
mod_description=A deep river-fishing simulator: assemble your rod from blank, reel, line, rig and hook, match bait and groundbait to each fish, feed your spot and wait for the bite.
